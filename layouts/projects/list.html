{{ define "main" }}
  <section class="section">
    <div class="container is-small">
      {{ range .Pages }}
        <div class="column">
          <div class="has-rounded card">
            <div class="card-image">
              <figure class="image">
                {{ partial "responsive-page-image.html" (dict
                  "Page" .
                  "Path" .Params.cover_image
                  "Alt" (partial "image-alt.html" (dict "Page" .))
                  "Sizes" "(min-width: 769px) 33vw, 100vw"
                  "Fit" "860x646 Center"
                  "Widths" (slice 360 540 720 860)
                  "Loading" "lazy"
                ) }}
              </figure>
            </div>
            <div class="card-content">
              <div class="media">
                <div class="media-content">
                  <p class="title is-4 has-blue-text"><a href="{{ .Permalink | relURL }}">{{ .Title }}</a></p>
                  <p class="has-text-grey is-size-7">{{ delimit .Page.Params.Areas ", " }}</p>
                </div>
              </div>
              <div class="content">
                <p>{{ .Summary | plainify | strings.TrimSpace }}</p>
              </div>
              <a class="button project-card-button" href="{{ .Permalink | relURL }}">{{ i18n "more" }}</a>
            </div>
          </div>
        </div>
      {{ end }}
    </div>
  </section>
{{ end }}
