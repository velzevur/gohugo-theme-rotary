{{- $src := .Get "src" -}}
{{- $ordinal := .Ordinal -}}
{{- $class := default "is-one-fifth" (.Get "class") -}}
{{- $alt := partial "image-alt.html" (dict "Page" .Page "Alt" (.Get "alt")) -}}
{{- with .Parent -}}
  <div class="column {{ $class }}">
    {{ $ordinal }}
    <img src="{{$src}}" alt="{{ $alt }}" class="has-rounded">
  </div>
{{- else -}}
  <img src="{{$src}}" alt="{{ $alt }}">
{{- end }}
