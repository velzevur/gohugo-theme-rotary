<div class="card has-rounded">
  <div class="card-image has-rounded-top">
    <figure class="image is-4by3 has-rounded-top">
      <a href="{{ .Permalink | relURL }}">
        {{- $permalink := .Permalink -}}
        {{- $card := . -}}
        {{- $image := .Params.cover | default .Params.image -}}
        {{- with $image -}}
        {{- $resources := $card.Resources.Match . -}}
        {{- $img := index ($resources) 0 -}}
        {{- $scaled := $img.Fill "430x324" -}}
        <img class="has-rounded-top" src="{{ $scaled.RelPermalink }}" width="{{ $scaled.Width }}" height="{{ $scaled.Height }}" alt="{{ partial "image-alt.html" (dict "Page" $card) }}" loading="lazy" decoding="async">
        {{ end }}
      </a>
      <time class="card-date-pill" datetime="{{ .PublishDate.Format "2006-01-02" }}">{{ partial "i18n-date.html" .PublishDate }}</time>
    </figure>
  </div>
  <div class="card-content">
    <div class="media">

      <div class="media-content">
        <p class="title is-4 has-blue-text"><a href="{{ .Permalink | relURL }}">{{ .Title }}</a></p>
      </div>
    </div>

    <div class="content">
      <p>{{ .Summary | plainify | strings.TrimSpace }}</p>
    </div>
    <a class="button card-read-more-button" href="{{ .Permalink | relURL }}">{{ i18n "more" }}</a>
  </div>
</div>
