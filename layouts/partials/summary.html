<div class="summary-card nested-copy-line-height">
  <div>
    <span class="section-label">{{ humanize .Section }}</span>
    <h1>
      <a href="{{ .Params.url | default .Permalink }}" class="link">
        {{ .Title }}
      </a>
    </h1>
    <div class="nested-links f5 lh-copy nested-copy-line-height">
      {{ .Summary  }}
    </div>
  </div>
</div>
